     <select name="events" id="events1" onchange="events1()">

         <option value="Paras">Paras</option>
         <option value="Sourabh">Sourabh</option>
         <option value="Manoj">Manoj</option>
     </select>
     <h1 onmouseover="events2()" onmouseout="events3()" id="events2">This will change on mouseover and mouseout</h1>
     <input type="text" onkeydown="events4()" id="events4">

     <!-- Strings -->
     <h1 class="heading">Strings</h1>
